<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ForgeByteTech</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  width: 100%;
  padding: 25px;
  text-align: center;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

header h1 {
  font-size: 2.2rem;
  letter-spacing: 1px;
}

header p {
  margin-top: 5px;
  color: #94a3b8;
}

.container {
  width: 90%;
  max-width: 1100px;
  margin-top: 30px;
}

.section-title {
  margin: 20px 0 10px;
  font-size: 1.3rem;
  color: #38bdf8;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 20px;
  transition: 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.08);
}

.card h3 {
  margin-bottom: 10px;
}

.card p {
  font-size: 0.9rem;
  color: #cbd5e1;
  margin-bottom: 15px;
}

.btn {
  display: inline-block;
  padding: 8px 12px;
  border-radius: 8px;
  background: #38bdf8;
  color: #0f172a;
  text-decoration: none;
  font-weight: bold;
  font-size: 0.85rem;
}

.btn:hover {
  background: #0ea5e9;
}

footer {
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  color: #94a3b8;
  font-size: 0.85rem;
}

.socials {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
  justify-content: center;
}

.socials a {
  padding: 8px 12px;
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  text-decoration: none;
  color: #e2e8f0;
  font-size: 0.85rem;
}

  </style>
</head>
<body>  <header>
    <h1>ForgeByteTech</h1>
    <p>Building digital chaos into structured innovation</p>
  </header>  <div class="container"><div class="section-title">Projects</div>
<div class="grid">

  <div class="card">
    <h3>Annoying AI</h3>
    <p>A playful AI experiment with dynamic personality responses and interactive UI behavior.</p>
    <a class="btn" href="annoyingai.html">View Project</a>
  </div>

</div><br><br>

<div class="section-title">Social Media</div>
<div class="socials">
  <a href="#">YouTube</a>
  <a href="#">TikTok</a>
  <a href="#">GitHub</a>
  <a href="#">Instagram</a>
</div>

  </div>  <footer>
    © 2026 ForgeByteTech. All rights reserved.
  </footer></body>
</html>
