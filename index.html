<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ForgeByteTech</title>

<style>
/* ===================== GLOBAL RESET ===================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* ===================== HEADER ===================== */
header {
  width: 100%;
  padding: 20px;
  text-align: center;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

header h1 {
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  background: linear-gradient(135deg, #38bdf8, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  margin-top: 5px;
  color: #94a3b8;
  font-size: clamp(0.85rem, 2vw, 1rem);
}

/* ===================== CONTAINER ===================== */
.container {
  width: 92%;
  max-width: 1100px;
  margin-top: 25px;
}

/* ===================== TITLES ===================== */
.section-title {
  margin: 20px 0 12px;
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  color: #38bdf8;
}

/* ===================== GRID ===================== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 18px;
}

/* ===================== CARD ===================== */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 18px;
  transition: 0.3s ease;
}

.card:hover {
  transform: translateY(-6px);
  background: rgba(255,255,255,0.08);
}

.card h3 {
  margin-bottom: 8px;
}

.card p {
  font-size: 0.9rem;
  color: #cbd5e1;
  margin-bottom: 12px;
  line-height: 1.4;
}

/* ===================== BUTTON ===================== */
.btn {
  display: inline-block;
  padding: 8px 12px;
  border-radius: 8px;
  background: #38bdf8;
  color: #0f172a;
  text-decoration: none;
  font-weight: bold;
  font-size: 0.85rem;
  transition: 0.3s;
}

.btn:hover {
  background: #0ea5e9;
  transform: scale(1.05);
}

/* ===================== SOCIAL SECTION ===================== */
.socials-section {
  margin-top: 30px;
  padding: 25px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
}

.socials {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 14px;
  margin-top: 15px;
}

/* ICON BUTTON */
.social-btn {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.3s;
  text-decoration: none;
  color: white;
}

.social-btn svg {
  width: 30px;
  height: 30px;
}

/* TEXT BUTTON */
.social-btn-text {
  padding: 10px 22px;
  border-radius: 50px;
  font-weight: 600;
  color: white;
  text-decoration: none;
  transition: 0.3s;
  white-space: nowrap;
}

/* ===================== SOCIAL COLORS ===================== */
.youtube {
  background: linear-gradient(135deg, #ff0000, #ff6b6b);
}

.facebook {
  background: linear-gradient(135deg, #1877f2, #0a66c2);
}

.tiktok {
  background: linear-gradient(135deg, #000, #25f4ee);
}

.instagram {
  background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af);
}

/* ===================== HOVER EFFECT ===================== */
.social-btn:hover,
.social-btn-text:hover {
  transform: translateY(-6px) scale(1.05);
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* ===================== FOOTER ===================== */
footer {
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  color: #94a3b8;
  font-size: 0.85rem;
}

/* ===================== RESPONSIVE ===================== */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }

  .social-btn {
    width: 58px;
    height: 58px;
  }

  .social-btn svg {
    width: 26px;
    height: 26px;
  }

  .social-btn-text {
    padding: 9px 18px;
    font-size: 0.85rem;
  }
}

@media (max-width: 480px) {
  .container {
    width: 95%;
  }

  .card {
    padding: 15px;
  }

  .socials {
    gap: 10px;
  }
}
</style>
</head>

<body>

<header>
  <h1>ForgeByteTech</h1>
  <p>Building digital chaos into structured innovation</p>
</header>

<div class="container">

  <div class="section-title">Projects</div>

  <div class="grid">
    <div class="card">
      <h3>Annoying AI</h3>

      <a class="btn" href="annoyingai.html">View Project</a>
    </div>
  </div>

  <div class="socials-section">
    <div class="section-title">Follow Us On Social Media</div>

    <div class="socials">

      <a href="https://www.tiktok.com/@forgebyte_tech" target="_blank" class="social-btn-text tiktok">
        TikTok
      </a>

      <a href="https://youtube.com/@forgebyte_tech" target="_blank" class="social-btn youtube">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>

      <a href="https://www.facebook.com/share/17XX45opyp/" target="_blank" class="social-btn facebook">

      <a href="https://www.instagram.com/forgebyte_tech" target="_blank" class="social-btn-text instagram">
        Instagram
      </a>

    </div>
  </div>

</div>

<footer>
  © 2027 ForgeByteTech. All rights reserved.
</footer>

</body>
</html>
