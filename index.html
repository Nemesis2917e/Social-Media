<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ForgeByteTech</title>

<style>
/* ===================== RESET ===================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* ===================== HEADER ===================== */
header {
  width: 100%;
  padding: 20px;
  text-align: center;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

header h1 {
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  background: linear-gradient(135deg, #38bdf8, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  margin-top: 6px;
  color: #94a3b8;
  font-size: clamp(0.85rem, 2vw, 1rem);
}

/* ===================== MAIN WRAPPER ===================== */
.container {
  width: 100%;
  max-width: 1100px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 25px;
}

/* ===================== SECTION TITLE ===================== */
.section-title {
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  color: #38bdf8;
  font-weight: 600;
}

/* ===================== PROJECT SECTION ===================== */
.projects {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  justify-content: flex-start;
}

/* CARD */
.card {
  flex: 1 1 280px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
  background: rgba(255,255,255,0.08);
}

.card h3 {
  font-size: 1.1rem;
}

.card p {
  font-size: 0.9rem;
  color: #cbd5e1;
  line-height: 1.4;
}

/* BUTTON */
.btn {
  align-self: flex-start;
  padding: 8px 12px;
  border-radius: 8px;
  background: #38bdf8;
  color: #0f172a;
  text-decoration: none;
  font-weight: bold;
  font-size: 0.85rem;
  transition: 0.3s;
}

.btn:hover {
  background: #0ea5e9;
  transform: scale(1.05);
}

/* ===================== SOCIAL SECTION ===================== */
.socials-section {
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.socials {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
}

/* SOCIAL BASE BUTTON */
.social-btn,
.social-btn-text {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
  color: white;
  font-weight: 600;
  transition: 0.3s;
}

/* ICON BUTTONS */
.social-btn {
  width: 62px;
  height: 62px;
  border-radius: 50%;
}

/* TEXT BUTTONS */
.social-btn-text {
  padding: 10px 20px;
  border-radius: 50px;
  white-space: nowrap;
  font-size: 0.9rem;
}

/* ICON SIZE */
.social-btn svg {
  width: 22px;
  height: 22px;
}

/* ===================== COLORS ===================== */
.youtube {
  background: linear-gradient(135deg, #ff0000, #ff6b6b);
}

.facebook {
  background: linear-gradient(135deg, #1877f2, #0a66c2);
}

.tiktok {
  background: linear-gradient(135deg, #000000, #111, #25f4ee);
}

.instagram {
  background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af);
}

/* ===================== HOVER ===================== */
.social-btn:hover,
.social-btn-text:hover {
  transform: translateY(-6px) scale(1.05);
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* ===================== FOOTER ===================== */
footer {
  width: 100%;
  text-align: center;
  padding: 20px;
  color: #94a3b8;
  font-size: 0.85rem;
}

/* ===================== RESPONSIVE ===================== */
@media (max-width: 768px) {
  .projects {
    justify-content: center;
  }

  .card {
    flex: 1 1 100%;
  }

  .social-btn {
    width: 55px;
    height: 55px;
  }

  .social-btn-text {
    padding: 9px 16px;
    font-size: 0.85rem;
  }
}

@media (max-width: 480px) {
  .container {
    padding: 12px;
  }

  .socials {
    gap: 10px;
  }
}
</style>
</head>

<body>

<header>
  <h1>ForgeByteTech</h1>
  <p>Building digital chaos into structured innovation</p>
</header>

<div class="container">

  <!-- PROJECTS -->
  <div class="section-title">Projects</div>

  <div class="projects">

    <div class="card">
      <h3>Annoying AI</h3>
      <p>A playful AI experiment with dynamic personality responses and interactive UI behavior.</p>
      <a class="btn" href="annoyingai.html">View Project</a>
    </div>

  </div>

  <!-- SOCIALS -->
  <div class="socials-section">

    <div class="section-title">Follow Us</div>

    <div class="socials">

      <!-- TikTok -->
      <a href="https://www.tiktok.com/@forgebyte_tech" class="social-btn-text tiktok">
        TikTok
      </a>

      <!-- YouTube -->
      <a href="https://youtube.com/@forgebyte_tech" class="social-btn youtube">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5S4.5 3.5 2.6 4.1A3 3 0 0 0 .5 6.2C0 8 0 12 0 12s0 4 .5 5.8a3 3 0 0 0 2.1 2.1C4.5 20.5 12 20.5 12 20.5s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 16 24 12 24 12s0-4-.5-5.8zM9.5 15.5v-7L15.8 12 9.5 15.5z"/>
        </svg>
      </a>

      <!-- Facebook -->
      <a href="https://www.facebook.com/share/17XX45opyp/" class="social-btn facebook">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M24 12c0-6.6-5.4-12-12-12S0 5.4 0 12c0 6 4.4 11 10 12v-8H7v-4h3V9c0-3 1.8-4.6 4.5-4.6H17v4h-2c-1.5 0-2 .9-2 1.9V12h4l-1 4h-3v8c5.6-1 10-6 10-12z"/>
        </svg>
      </a>

      <!-- Instagram -->
      <a href="https://www.instagram.com/forgebyte_tech" class="social-btn-text instagram">
        Instagram
      </a>

    </div>
  </div>

</div>

<footer>
  © 2026 ForgeByteTech. All rights reserved.
</footer>

</body>
</html>
